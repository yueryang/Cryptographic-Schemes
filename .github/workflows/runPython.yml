name: Run Python

# Thanks to [https://github.com/JHUISI/charm/blob/dev/.github/workflows/ci.yml](https://github.com/JHUISI/charm/blob/dev/.github/workflows/ci.yml). 

on:
  pull_request:
    branches:
      - main
    paths:
      - '**/*.py'
      - '.github/workflows/runPython.yml'
      - 'requirements.txt'
  push:
    branches:
      - main
    paths:
      - '**/*.py'
      - '.github/workflows/runPython.yml'
      - 'requirements.txt'
  workflow_dispatch:
    inputs:
      runSchemeAAIBME:
        description: 'SchemeAAIBME'
        required: true
        default: true
        type: boolean
      runSchemeCANIFPPCT:
        description: 'SchemeCANIFPPCT'
        required: true
        default: true
        type: boolean
      runSchemeHIBME:
        description: 'SchemeHIBME'
        required: true
        default: true
        type: boolean
      runSchemeIBMEMR:
        description: 'SchemeIBMEMR'
        required: true
        default: true
        type: boolean
      runSchemeIBMETR:
        description: 'SchemeIBMETR'
        required: true
        default: true
        type: boolean
      runSchemeIBPRME:
        description: 'SchemeIBPRME'
        required: true
        default: true
        type: boolean
      runSchemeVLPSICA:
        description: 'SchemeVLPSICA'
        required: true
        default: false
        type: boolean
      pythonVersion:
        description: 'Python version'
        required: true
        default: '3.x'
        type: choice
        options:
          - '3.x'
          - '3.12'
          - '3.13'
          - '3.14'
          - '3.15'
      outputFormat:
        description: 'Output format'
        required: true
        default: '.xlsx'
        type: choice
        options:
          - '.csv'
          - '.htm'
          - '.html'
          - '.json'
          - '.tex'
          - '.tsv'
          - '.txt'
          - '.xls'
          - '.xlsx'
          - '.xml'
          - '.yaml'
          - '.yml'
      decimalPlace:
        description: 'Decimal Place'
        required: true
        default: 9
        type: choice
        options:
          - 0
          - 's'
          - 'second'
          - 3
          - 'ms'
          - 'millisecond'
          - 6
          - 'microsecond'
          - 9
          - 'ns'
          - 'nanosecond'
          - 12
          - 'ps'
          - 'picosecond'
          - 15
          - 'fs'
          - 'femtosecond'
      runCount:
        description: 'Run count'
        required: true
        default: '10'
        type: string

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Prepare the matrix
        id: matrix
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]];
          then
            runSchemeAAIBME="${{ github.event.inputs.runSchemeAAIBME }}"
            runSchemeCANIFPPCT="${{ github.event.inputs.runSchemeCANIFPPCT }}"
            runSchemeHIBME="${{ github.event.inputs.runSchemeHIBME }}"
            runSchemeIBMEMR="${{ github.event.inputs.runSchemeIBMEMR }}"
            runSchemeIBMETR="${{ github.event.inputs.runSchemeIBMETR }}"
            runSchemeIBPRME="${{ github.event.inputs.runSchemeIBPRME }}"
            runSchemeVLPSICA="${{ github.event.inputs.runSchemeVLPSICA }}"
          else
            runSchemeAAIBME="true"
            runSchemeCANIFPPCT="true"
            runSchemeHIBME="true"
            runSchemeIBMEMR="true"
            runSchemeIBMETR="true"
            runSchemeIBPRME="true"
            runSchemeVLPSICA="false"
          fi
          matrix=()
          if [[ "true" == "${runSchemeAAIBME}" ]];
          then
            matrix+=("SchemeAAIBME/SchemeAAIBME.py" "SchemeAAIBME/SchemeFuzzyME.py" "SchemeIBMETR/SchemeIBMECH.py")
          fi
          if [[ "true" == "${runSchemeCANIFPPCT}" ]];
          then
            matrix+=("SchemeCANIFPPCT/SchemeCANIFPPCT.py")
          fi
          if [[ "true" == "${runSchemeHIBME}" ]];
          then
            matrix+=("SchemeHIBME/SchemeAnonymousME.py" "SchemeHIBME/SchemeHIBME.py")
          fi
          if [[ "true" == "${runSchemeIBMEMR}" ]];
          then
            matrix+=("SchemeIBMEMR/SchemeIBBME.py" "SchemeIBMETR/SchemeIBME.py" "SchemeIBMEMR/SchemeIBMEMR.py")
          fi
          if [[ "true" == "${runSchemeIBMETR}" ]];
          then
            matrix+=("SchemeIBMETR/SchemeAIBE.py" "SchemeIBMETR/SchemeARES.py" "SchemeIBMETR/SchemeIBME.py" "SchemeIBMETR/SchemeIBMECH.py" "SchemeIBMETR/SchemeIBMETR.py")
          fi
          if [[ "true" == "${runSchemeIBPRME}" ]];
          then
            matrix+=("SchemeIBMETR/SchemeIBME.py" "SchemeIBMETR/SchemeIBMECH.py" "SchemeIBPRME/SchemeIBPME.py" "SchemeIBPRME/SchemeIBPRME.py" "SchemeIBPRME/SchemePBAC.py")
          fi
          if [[ "true" == "${runSchemeVLPSICA}" ]];
          then
            matrix+=("SchemeVLPSICA/SchemeVLPSICA.py")
          fi
          if [[ ${#matrix[@]} -ge 1 ]];
          then
            echo "matrix=$(printf '%s\n' "${matrix[@]}" | jq -R . | jq -s -c 'unique')" >> "${GITHUB_OUTPUT}"
          else
            echo "matrix=[]" >> "${GITHUB_OUTPUT}"
          fi
  
  runPython:
    if: needs.prepare.outputs.matrix != '[]'
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cryptographicScheme: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          sparse-checkout:
            - '${{ matrix.cryptographicScheme }}'
            - 'buildSchemeLaTeXPDFs.py'
            - 'requirements.txt'
      
      - name: Get ready
        id: ready
        run: |
          cd "${{ github.workspace }}"
          
          # Decimal place #
          if [[ "s" == "${decimalPlaceString}" || "second" == "${decimalPlaceString}" ]];
          then
            decimalPlace=0
          elif [[ "ms" == "${decimalPlaceString}" || "millisecond" == "${decimalPlaceString}" ]];
          then
            decimalPlace=3
          elif [[ "microsecond" == "${decimalPlaceString}" ]];
          then
            decimalPlace=6
          elif [[ "ns" == "${decimalPlaceString}" || "nanosecond" == "${decimalPlaceString}" ]];
          then
            decimalPlace=9
          elif [[ "ps" == "${decimalPlaceString}" || "picosecond" == "${decimalPlaceString}" ]];
          then
            decimalPlace=12
          elif [[ "fs" == "${decimalPlaceString}" || "femtosecond" == "${decimalPlaceString}" ]];
          then
            decimalPlace=15
          else
            decimalPlace=${decimalPlaceString}
          fi
          
          # Run count #
          strippedRunCountString="$(echo -n "${runCountString}" | tr -d '\t _')"
          leadingSigns="${strippedRunCountString%%[!+-]*}"
          minusCount=$(echo -n "${leadingSigns}" | tr -cd '-' | wc -c)
          strippedRunCountString="${strippedRunCountString#$leadingSigns}"
          if [[ "${strippedRunCountString:0:1}" =~ [0-9] ]];
          then
            case "${strippedRunCountString: -1}" in
              'B'|'b')
                base=2
                strippedRunCountString="${strippedRunCountString:0:-1}"
                ;;
              'Q'|'q')
                base=4
                strippedRunCountString="${strippedRunCountString:0:-1}"
                ;;
              'O'|'o')
                base=8
                strippedRunCountString="${strippedRunCountString:0:-1}"
                ;;
              'D'|'d')
                base=10
                strippedRunCountString="${strippedRunCountString:0:-1}"
                ;;
              'X'|'x')
                base=16
                strippedRunCountString="${strippedRunCountString:0:-1}"
                ;;
              *)
                base=10
                ;;
            esac
          else
            case "${strippedRunCountString:0:1}" in
              'B'|'b')
                base=2
                strippedRunCountString="${strippedRunCountString:1}"
                ;;
              'Q'|'q')
                base=4
                strippedRunCountString="${strippedRunCountString:1}"
                ;;
              'O'|'o')
                base=8
                strippedRunCountString="${strippedRunCountString:1}"
                ;;
              'D'|'d')
                base=10
                strippedRunCountString="${strippedRunCountString:1}"
                ;;
              'X'|'x')
                base=16
                strippedRunCountString="${strippedRunCountString:1}"
                ;;
              *)
                base=10
                ;;
            esac
          fi
          strippedRunCountString="$(echo "${strippedRunCountString}" | sed 's/^0*//')"
          strippedRunCountString="${strippedRunCountString%%.*}"
          runCount=10
          { runCount=$((${base}#$strippedRunCountString)); } 2>/dev/null
          if (( minusCount % 2 == 1 ));
          then
            runCount=$(( -runCount ))
          fi
          if [[ ${runCount} -lt 1 ]];
          then
            runCount=10
          fi
          
          folderPath="$(dirname "${{ matrix.cryptographicScheme }}")"
          mainFileName="$(basename "${{ matrix.cryptographicScheme }}" | sed "s/\.[^.]*\$//g")"
          timeString="HKT$(date '+%Y%m%d%H%M%S')"
          outputFilePath="${folderPath}/${mainFileName}-Python${pythonVersion}-p${decimalPlace}-r${runCount}-${timeString}${outputFormat}"
          outputFileName="$(basename "${outputFilePath}")"
          schemeLaTeXFilePath="${folderPath}/${mainFileName}LaTeX/${mainFileName}-${timeString}.tex"
          schemePDFFilePath="${folderPath}/${mainFileName}LaTeX/${mainFileName}-${timeString}.pdf"
          echo "Cryptographic scheme: ${{ matrix.cryptographicScheme }}"
          echo "Output format: ${outputFormat}"
          echo "Time string: ${timeString}"
          echo "Output file path: ${outputFilePath}"
          echo "Output file name: ${outputFileName}"
          echo "Python version: ${pythonVersion}"
          echo "Run count: ${runCount}"
          echo "Decimal place: ${decimalPlaceString} (${decimalPlace})"
          echo "Scheme LaTeX file path: ${schemeLaTeXFilePath}"
          echo "Scheme PDF file path: ${schemePDFFilePath}"
          echo "timeString=${timeString}" >> "${GITHUB_OUTPUT}"
          echo "outputFilePath=${outputFilePath}" >> "${GITHUB_OUTPUT}"
          echo "outputFileName=${outputFileName}" >> "${GITHUB_OUTPUT}"
          echo "pythonVersion=${pythonVersion}" >> "${GITHUB_OUTPUT}"
          echo "runCount=${runCount}" >> "${GITHUB_OUTPUT}"
          echo "decimalPlace=${decimalPlaceString}" >> "${GITHUB_OUTPUT}"
          echo "schemeLaTeXFilePath=${schemeLaTeXFilePath}" >> "${GITHUB_OUTPUT}"
          echo "schemePDFFilePath=${schemePDFFilePath}" >> "${GITHUB_OUTPUT}"
        env:
          pythonVersion: ${{ github.event.inputs.pythonVersion || '3.x' }}
          outputFormat: ${{ github.event.inputs.outputFormat || '.xlsx' }}
          decimalPlaceString: ${{ github.event.inputs.decimalPlace || '9' }}
          runCountString: ${{ github.event.inputs.runCount || '10' }}
          TZ: 'Asia/Hong_Kong'
      
      - name: Install system dependencies
        run: |
          cd "${{ github.workspace }}"
          sudo apt-get update
          sudo apt-get install -y flex libfl-dev libgmp-dev libssl-dev texlive-latex-base wget
      
      - name: Set up Python ${{ steps.ready.outputs.pythonVersion }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ steps.ready.outputs.pythonVersion }}
      
      - name: Install Python dependencies
        run: |
          cd "${{ github.workspace }}"
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      
      - name: Build LaTeX and the PDF for the cryptographic scheme
        run: |
          cd "${{ github.workspace }}"
          echo "\$ python buildSchemeLaTeXPDFs.py \"${{ matrix.cryptographicScheme }}\""
          python buildSchemeLaTeXPDFs.py "${{ matrix.cryptographicScheme }}"
        env:
          FORMATTER: '%p%s%mLaTeX%s%m-${{ steps.ready.outputs.timeString }}'
          WAITING_TIME: 0
      
      - name: Upload the LaTeX source code for the cryptographic scheme
        uses: actions/upload-artifact@v7
        with:
          path: ${{ github.workspace }}/${{ steps.ready.outputs.schemeLaTeXFilePath }}
          archive: false
          if-no-files-found: warn
      
      - name: Upload the PDF for the cryptographic scheme
        uses: actions/upload-artifact@v7
        with:
          path: ${{ github.workspace }}/${{ steps.ready.outputs.schemePDFFilePath }}
          archive: false
          if-no-files-found: warn
      
      - name: Build and install the PBC library
        run: |
          cd "${{ github.workspace }}"
          wget https://crypto.stanford.edu/pbc/files/pbc-1.0.0.tar.gz
          tar -xzf pbc-1.0.0.tar.gz
          cd pbc-1.0.0
          ./configure LDFLAGS="-lgmp"
          make -j$(nproc)
          sudo make install
          sudo ldconfig
      
      - name: Build and install the Python Charm-Crypto framework
        run: |
          cd "${{ github.workspace }}"
          git clone https://github.com/JHUISI/charm
          cd charm
          chmod +x ./configure.sh
          ./configure.sh
          make -j$(nproc)
          sudo make install
      
      - name: Run the cryptographic scheme
        run: |
          cd "${{ github.workspace }}"
          echo "The current working directory is \"$(pwd)\". "
          if [[ -f "${{ matrix.cryptographicScheme }}" ]];
          then
            echo "\$ python \"${{ matrix.cryptographicScheme }}\" -t 0 -h"
            python "${{ matrix.cryptographicScheme }}" -t 0 -h
            echo ""
            echo "\$ python \"${{ matrix.cryptographicScheme }}\" -o \"${{ steps.ready.outputs.outputFileName }}\" -p ${{ steps.ready.outputs.decimalPlace }} -r ${{ steps.ready.outputs.runCount }} -t 0 -y"
            python "${{ matrix.cryptographicScheme }}" -o "${{ steps.ready.outputs.outputFileName }}" -p ${{ steps.ready.outputs.decimalPlace }} -r ${{ steps.ready.outputs.runCount }} -t 0 -y
          else
            echo "Could not execute the cryptographic scheme file \"${{ matrix.cryptographicScheme }}\" via Python ${{ steps.ready.outputs.pythonVersion }}. "
            tree
          fi
      
      - name: Upload the result
        uses: actions/upload-artifact@v7
        with:
          path: ${{ github.workspace }}/${{ steps.ready.outputs.outputFilePath }}
          archive: false
          if-no-files-found: error